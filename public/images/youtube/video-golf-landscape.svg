<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" width="640" height="360" role="img" aria-label="라오스 골프 1인 라운딩">
  <defs>
    <linearGradient id="skyGolf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#274b6b"/>
      <stop offset="45%" stop-color="#e08a4f"/>
      <stop offset="75%" stop-color="#f5c26b"/>
      <stop offset="100%" stop-color="#f7d693"/>
    </linearGradient>
    <radialGradient id="sunGolf" cx="50%" cy="62%" r="18%">
      <stop offset="0%" stop-color="#fff3d6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff3d6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fairwayGolf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3f6b3a"/>
      <stop offset="100%" stop-color="#2c4d29"/>
    </linearGradient>
    <linearGradient id="pondGolf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6c979"/>
      <stop offset="100%" stop-color="#7a9bab"/>
    </linearGradient>
  </defs>

  <rect width="640" height="360" fill="url(#skyGolf)"/>
  <circle cx="320" cy="222" r="120" fill="url(#sunGolf)"/>
  <circle cx="320" cy="222" r="34" fill="#fce7b8"/>

  <!-- distant hills -->
  <path d="M0 240 Q120 205 260 232 T520 224 T640 236 V260 H0Z" fill="#8a6b52" opacity="0.55"/>

  <!-- fairway -->
  <path d="M0 258 Q160 230 320 250 T640 246 V360 H0Z" fill="url(#fairwayGolf)"/>

  <!-- pond -->
  <ellipse cx="330" cy="286" rx="150" ry="34" fill="url(#pondGolf)" opacity="0.85"/>
  <ellipse cx="330" cy="286" rx="150" ry="34" fill="none" stroke="#fbead0" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- bunker -->
  <ellipse cx="150" cy="300" rx="46" ry="14" fill="#e7d3a3" opacity="0.9"/>

  <!-- palm trees silhouette, left -->
  <g fill="#1f2f1c">
    <path d="M40 330 V255"/>
    <path d="M40 258 q-34 -10 -48 6 q26 6 48 -6Z"/>
    <path d="M40 258 q34 -14 44 2 q-26 8 -44 -2Z"/>
    <path d="M40 254 q-26 -20 -34 -2 q22 2 34 2Z"/>
    <path d="M40 254 q30 -18 36 0 q-20 4 -36 0Z"/>
  </g>
  <g fill="#1f2f1c" stroke="#1f2f1c" stroke-width="6" stroke-linecap="round">
    <path d="M40 330 V255" fill="none"/>
  </g>

  <!-- palm trees silhouette, right -->
  <g fill="#24361f">
    <path d="M588 335 V268" stroke="#24361f" stroke-width="7" stroke-linecap="round"/>
    <path d="M588 270 q-30 -12 -42 4 q24 6 42 -4Z"/>
    <path d="M588 270 q30 -16 40 0 q-22 8 -40 0Z"/>
    <path d="M588 266 q-22 -18 -30 -2 q18 2 30 2Z"/>
  </g>

  <!-- flag on distant green -->
  <g>
    <line x1="470" y1="252" x2="470" y2="228" stroke="#3a2a1c" stroke-width="2"/>
    <path d="M470 228 l16 5 -16 5Z" fill="#c0392b"/>
  </g>

  <rect x="0" y="330" width="640" height="30" fill="#1f2f1c" opacity="0.35"/>
</svg>
