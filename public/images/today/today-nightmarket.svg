<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" width="640" height="480" role="img" aria-label="비엔티안 야시장 분위기">
  <defs>
    <linearGradient id="skyNM" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1230"/>
      <stop offset="55%" stop-color="#3a1f3d"/>
      <stop offset="100%" stop-color="#7a3b1e"/>
    </linearGradient>
    <radialGradient id="glowNM" cx="50%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#ffb15c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb15c" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="480" fill="url(#skyNM)"/>
  <rect width="640" height="480" fill="url(#glowNM)"/>
  <!-- distant skyline -->
  <g fill="#160c22" opacity="0.9">
    <rect x="-10" y="300" width="60" height="140"/>
    <rect x="55" y="270" width="40" height="170"/>
    <rect x="560" y="280" width="50" height="160"/>
    <rect x="605" y="250" width="40" height="190"/>
  </g>
  <!-- market stalls -->
  <g fill="#2a1a22">
    <path d="M60 440 60 360 140 330 220 360 220 440Z"/>
    <path d="M240 440 240 350 330 315 420 350 420 440Z"/>
    <path d="M440 440 440 365 520 335 600 365 600 440Z"/>
  </g>
  <g fill="#4a2a1c">
    <rect x="60" y="360" width="160" height="10"/>
    <rect x="240" y="350" width="180" height="10"/>
    <rect x="440" y="365" width="160" height="10"/>
  </g>
  <!-- string lights -->
  <g fill="#ffd27a">
    <circle cx="90" cy="345" r="4"/>
    <circle cx="140" cy="332" r="4"/>
    <circle cx="190" cy="345" r="4"/>
    <circle cx="270" cy="333" r="4"/>
    <circle cx="330" cy="317" r="4"/>
    <circle cx="390" cy="333" r="4"/>
    <circle cx="470" cy="348" r="4"/>
    <circle cx="520" cy="337" r="4"/>
    <circle cx="570" cy="348" r="4"/>
  </g>
  <g stroke="#ffd27a" stroke-width="1.5" opacity="0.6" fill="none">
    <path d="M60 335 Q140 300 220 335"/>
    <path d="M240 325 Q330 285 420 325"/>
    <path d="M440 340 Q520 300 600 340"/>
  </g>
  <!-- ground reflection -->
  <rect x="0" y="440" width="640" height="40" fill="#120a1a"/>
  <ellipse cx="320" cy="440" rx="300" ry="14" fill="#ffb15c" opacity="0.18"/>
</svg>
